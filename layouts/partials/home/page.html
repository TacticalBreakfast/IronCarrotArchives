<article class="max-w-full prose dark:prose-invert">
  {{ with .Title }}
    <header>
      <h1>{{ . | emojify }}</h1>
    </header>
  {{ end }}
  <section class="w-full">{{ .Content }}</section>
</article>
<section>
  {{ partial "recent-articles/main.html" . }}
</section>
<section class="mt-10 prose dark:prose-invert">
  {{ partial "author.html" . }}
</section>
