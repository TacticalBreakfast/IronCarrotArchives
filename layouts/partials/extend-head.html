<meta name="robots" content="noai, noimageai">
<script>
/* Pin the header to full opacity on touch devices to prevent the blur-fade-in animation
   from flickering during inertial scrolling. This inline script in <head> runs
   synchronously before any external scripts are fetched, so we can intercept
   window.addEventListener and wrap every subsequent scroll listener with a post-call
   that resets #menu-blur opacity to 1. The DOMContentLoaded handler covers the initial
   opacity = 0 that background-blur.js sets directly on page load (outside any scroll
   event). */
(function () {
    if (navigator.maxTouchPoints === 0 && !('ontouchstart' in window)) return;
    var _origAdd = window.addEventListener.bind(window);
    window.addEventListener = function (type, listener, options) {
        if (type !== 'scroll') return _origAdd(type, listener, options);
        return _origAdd(type, function (e) {
            listener.call(this, e);
            var el = document.getElementById('menu-blur');
            if (el) el.style.opacity = '1';
        }, options);
    };
    document.addEventListener('DOMContentLoaded', function () {
        var el = document.getElementById('menu-blur');
        if (el) el.style.opacity = '1';
    });
}());
</script>
